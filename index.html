<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renzuis Stresser · Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0d15;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(120, 50, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 200, 0.05) 0%, transparent 50%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(15, 17, 29, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 2.5rem;
            padding: 2.8rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 2.5rem;
            padding: 2px;
            background: conic-gradient(from 0deg, #7c3aed, #2563eb, #06b6d4, #a855f7, #7c3aed);
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: rotateGlow 8s linear infinite;
            opacity: 0.5;
        }

        @keyframes rotateGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand .icon-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #1e1b3a, #0f0d1f);
            border-radius: 24px;
            font-size: 2.2rem;
            color: #a855f7;
            margin-bottom: 1rem;
            border: 1px solid rgba(168, 85, 247, 0.15);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.08);
            transition: 0.3s;
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #c084fc);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 4s ease-in-out infinite alternate;
        }

        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .brand .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-top: 0.3rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .brand .sub i {
            margin: 0 4px;
            color: #a855f7;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.4rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            transition: all 0.25s;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: #7c3aed;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12), inset 0 0 20px rgba(124, 58, 237, 0.02);
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #475569;
            font-size: 1rem;
            transition: 0.25s;
            pointer-events: none;
        }

        .input-wrapper:focus-within i {
            color: #a855f7;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            background: transparent;
            border: none;
            outline: none;
            color: #f1f5f9;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper input::placeholder {
            color: #475569;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .toggle-pass:hover {
            color: #a855f7;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.2rem 0 1.8rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .remember input[type="checkbox"] {
            accent-color: #7c3aed;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot {
            color: #94a3b8;
            font-size: 0.85rem;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .forgot:hover {
            color: #f59e0b;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border: none;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, 0.05) 100%);
            pointer-events: none;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(124, 58, 237, 0.35);
        }

        .btn-login:active {
            transform: scale(0.97);
        }

        .btn-login i {
            margin-right: 10px;
        }

        .register-link {
            text-align: center;
            margin-top: 1.8rem;
            color: #64748b;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .register-link a:hover {
            color: #c084fc;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(168, 85, 247, 0.06);
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            border: 1px solid rgba(168, 85, 247, 0.08);
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .status-badge .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulseDot 1.8s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }

        .toast {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(15, 17, 29, 0.95);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            min-width: 300px;
            animation: slideDown 0.5s ease;
        }

        .toast.show {
            display: block;
        }

        .toast .icon {
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .toast h3 {
            color: #f1f5f9;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
        }

        .toast p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        .toast.success .icon {
            color: #22c55e;
        }
        .toast.success {
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .toast.error .icon {
            color: #ef4444;
        }
        .toast.error {
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 2rem;
            }

            .brand h1 {
                font-size: 1.4rem;
            }

            .brand .icon-badge {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }

            .form-options {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }

            .btn-login {
                font-size: 0.9rem;
                padding: 0.9rem;
            }

            .toast {
                min-width: 90%;
                padding: 1rem;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h3 id="toastTitle">BERHASIL</h3>
        <p id="toastMessage">Login berhasil!</p>
    </div>

    <div class="login-card">
        <div class="brand">
            <div class="icon-badge">
                <i class="fas fa-bolt"></i>
            </div>
            <h1>WELCOME TO<br />RENZUIS STRESSER</h1>
            <div class="sub">
                <i class="fas fa-shield-alt"></i> · secure access · <i class="fas fa-shield-alt"></i>
            </div>
        </div>

        <form autocomplete="off">
            <div class="form-group">
                <label><i class="fas fa-user" style="margin-right: 6px;"></i> Username / Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="loginEmail" placeholder="Masukkan username atau email" />
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right: 6px;"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" id="loginPassword" placeholder="Masukkan password" />
                    <button type="button" class="toggle-pass" id="toggleBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember">
                    <input type="checkbox" checked /> Ingat saya
                </label>
                <a href="forgot-password.html" class="forgot">
                    <i class="fas fa-key" style="margin-right: 4px;"></i> Lupa password?
                </a>
            </div>

            <button type="button" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> LOGIN
            </button>

            <div class="register-link">
                Belum punya akun? <a href="register.html">Daftar sekarang</a>
            </div>

            <div style="display: flex; justify-content: center;">
                <div class="status-badge">
                    <span class="dot"></span> sistem aktif · v2.4.1
                </div>
            </div>
        </form>
    </div>

    <script>
        // Toggle password
        const toggleBtn = document.getElementById('toggleBtn');
        const passwordInput = document.getElementById('loginPassword');

        toggleBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // Toast function
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = 'toast show ' + type;
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastMessage').textContent = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Login function
        document.getElementById('loginBtn').addEventListener('click', function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showToast('❌ ERROR', 'Email dan password harus diisi!', 'error');
                return;
            }

            // Cek di localStorage
            const stored = localStorage.getItem('userData');
            if (stored) {
                const data = JSON.parse(stored);
                if (data.email.toLowerCase() === email.toLowerCase() && data.password === password) {
                    showToast('✅ BERHASIL', 'Selamat datang kembali!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    return;
                }
            }

            // Default account (hanya untuk testing)
            if (email.toLowerCase() === 'admin@renzuis.com' && password === 'admin123') {
                // Buat default account jika belum ada
                if (!stored) {
                    const defaultUser = {
                        name: 'Administrator',
                        email: 'admin@renzuis.com',
                        password: 'admin123',
                        duration: 365,
                        registeredDate: new Date().toISOString()
                    };
                    localStorage.setItem('userData', JSON.stringify(defaultUser));
                }
                showToast('✅ BERHASIL', 'Selamat datang Admin!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                return;
            }

            showToast('❌ GAGAL', 'Email atau password salah!', 'error');
        });

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>

</body>
</html>
